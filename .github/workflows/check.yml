name: Scheduled availability check

on:
  schedule:
    # Every 5 minutes. Public repos get unlimited free Actions minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          ITEM_ID: ${{ secrets.ITEM_ID }}
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python checker.py

      - name: Commit updated state
        run: |
          git config user.name "state-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state"
          git push
